worker_processes 1;
error_log /dev/null;

events {
    worker_connections 4096;
}

http {
    access_log off;
    keepalive_requests 10000;
    keepalive_timeout 30s;

    upstream api {
        server api1:8080;
        server api2:8080;
        keepalive 256;
    }

    server {
        listen 9999 backlog=4096;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }
}
