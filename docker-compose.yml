services:
  nginx:
    image: nginx:1.27-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    mem_limit: 40m
    cpus: 0.3
    networks:
      - backend

  api1:
    image: icalbuquerque/rinha-de-backend-2026-api:hot-20260510
    pull_policy: always
    platform: linux/amd64
    environment:
      - RESOURCES_PATH=/resources
      - GOMEMLIMIT=125MiB
      - GOGC=50
    mem_limit: 155m
    cpus: 0.35
    networks:
      - backend

  api2:
    image: icalbuquerque/rinha-de-backend-2026-api:hot-20260510
    pull_policy: always
    platform: linux/amd64
    environment:
      - RESOURCES_PATH=/resources
      - GOMEMLIMIT=125MiB
      - GOGC=50
    mem_limit: 155m
    cpus: 0.35
    networks:
      - backend

networks:
  backend:
    driver: bridge
