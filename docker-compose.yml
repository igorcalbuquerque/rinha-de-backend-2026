services:
  nginx:
    image: nginx:1.25-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    mem_limit: 20m
    cpus: 0.1
    networks:
      - backend

  api1:
    image: icalbuquerque/rinha-de-backend-2026-api:latest
    platform: linux/amd64
    environment:
      - RESOURCES_PATH=/resources
      - GOMEMLIMIT=125MiB
      - GOGC=40
    volumes:
      - ../resources:/resources:ro
    mem_limit: 165m
    cpus: 0.45
    networks:
      - backend

  api2:
    image: icalbuquerque/rinha-de-backend-2026-api:latest
    platform: linux/amd64
    environment:
      - RESOURCES_PATH=/resources
      - GOMEMLIMIT=125MiB
      - GOGC=40
    volumes:
      - ../resources:/resources:ro
    mem_limit: 165m
    cpus: 0.45
    networks:
      - backend

networks:
  backend:
    driver: bridge
